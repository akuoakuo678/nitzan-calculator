<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Futures Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--burgundy:#5a0f1a;
--burgundy-soft:#7a1b2a;
--silver:#cfcfcf;
--gray:#2b2b2f;
--black:#0d0d0f;
--white:#ffffff;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Heebo',sans-serif;
background:linear-gradient(140deg,#0d0d0f,#1c1c20);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:var(--silver);
overflow:hidden;
}

/* אנימציית קווים עדינים */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
linear-gradient(60deg,transparent 48%,rgba(255,255,255,0.05) 50%,transparent 52%);
animation:lines 8s linear infinite;
}

@keyframes lines{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.container{
position:relative;
background:linear-gradient(145deg,#141416,#1e1e22);
padding:40px;
width:100%;
max-width:460px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:
0 0 40px rgba(122,27,42,0.3),
inset 0 0 20px rgba(255,255,255,0.03);
animation:fade 0.8s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;}
}

h2{
text-align:center;
font-weight:300;
color:white;
margin-bottom:28px;
letter-spacing:1px;
}

input{
width:100%;
padding:14px;
margin-bottom:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
background:var(--gray);
color:white;
font-size:15px;
transition:0.25s;
}

input:focus{
outline:none;
border-color:var(--burgundy-soft);
box-shadow:0 0 10px rgba(122,27,42,0.6);
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:15px;
letter-spacing:1px;
background:linear-gradient(90deg,var(--burgundy),var(--burgundy-soft));
color:white;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(122,27,42,0.6);
}

.results{
margin-top:25px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.06);
display:none;
animation:fade 0.5s ease;
}

.result-item{
margin-bottom:10px;
font-size:14px;
}

.highlight{
color:white;
font-weight:600;
}

@media(max-width:500px){
.container{padding:25px;margin:20px;}
}
</style>
</head>
<body>

<div class="container">

<h2>Futures Risk Calculator</h2>

<input type="number" id="account" placeholder="גודל תיק (USDT)">
<input type="number" id="risk" placeholder="אחוז סיכון מהתיק (%)">
<input type="number" id="stop" placeholder="אחוז סטופ מהכניסה (%)">
<input type="number" id="tp" placeholder="אחוז טייק פרופיט (%)">

<button onclick="calculate()">CALCULATE</button>

<div class="results" id="results">

<div class="result-item" id="riskAmount"></div>
<div class="result-item" id="margin"></div>
<div class="result-item" id="leverage"></div>
<div class="result-item" id="positionSize"></div>

<div class="result-item highlight" id="rr"></div>
<div class="result-item" id="profitAmount"></div>
<div class="result-item" id="breakeven"></div>

</div>
</div>

<script>

function calculate(){

const account = parseFloat(document.getElementById("account").value);
const riskPercentInput = parseFloat(document.getElementById("risk").value);
const stopPercentInput = parseFloat(document.getElementById("stop").value);
const tpPercentInput = parseFloat(document.getElementById("tp").value);

if(!account || !riskPercentInput || !stopPercentInput || !tpPercentInput){
alert("מלא את כל השדות");
return;
}

const riskPercent = riskPercentInput/100;
const stopPercent = stopPercentInput/100;
const tpPercent = tpPercentInput/100;

const riskAmount = account * riskPercent;

/* גודל פוזיציה דרוש לפי סטופ */
const requiredPosition = riskAmount / stopPercent;

/* מקס מרג'ין 33% מהתיק */
const margin = account * 0.33;

/* מינוף נדרש */
const rawLeverage = requiredPosition / margin;

/* מינוף עגול כלפי מטה */
const leverage = Math.floor(rawLeverage);

if(leverage < 1){
alert("העסקה לא אפשרית עם סטופ כזה וסיכון כזה");
return;
}

/* פוזיציה בפועל */
const positionSize = margin * leverage;

/* רווח פוטנציאלי */
const profitAmount = positionSize * tpPercent;

/* Risk Reward */
const rrRatio = tpPercentInput / stopPercentInput;

/* אחוז הצלחה לאיזון */
const breakeven = 100 / (1 + rrRatio);

document.getElementById("riskAmount").innerHTML =
"Risk Amount: " + riskAmount.toFixed(2) + " USDT";

document.getElementById("margin").innerHTML =
"Margin Used (33%): " + margin.toFixed(2) + " USDT";

document.getElementById("leverage").innerHTML =
"Leverage: x" + leverage;

document.getElementById("positionSize").innerHTML =
"Position Size: " + positionSize.toFixed(2) + " USDT";

document.getElementById("rr").innerHTML =
"Risk / Reward: 1 : " + rrRatio.toFixed(2);

document.getElementById("profitAmount").innerHTML =
"Potential Profit: " + profitAmount.toFixed(2) + " USDT";

document.getElementById("breakeven").innerHTML =
"Break Even Win Rate: " + breakeven.toFixed(2) + "%";

document.getElementById("results").style.display="block";

}

</script>

</body>
</html>
